<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Cubes | DesignTworks Lab</title>
    <meta
      name="description"
      content="Three.js hero cube experiment collected inside DesignTworks Lab."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="utility-nav" aria-label="Page navigation">
        <a href="../index.html">Lab</a>
        <a href="../../index.html">Hub</a>
      </nav>

      <main class="hero" id="home" aria-labelledby="hero-title">
        <div class="hero__grid"></div>
        <div class="hero__glow hero__glow--top"></div>
        <div class="hero__glow hero__glow--bottom"></div>

        <section class="hero__inner">
          <div class="hero__copy">
            <h1 id="hero-title" class="hero__title">
              <span>Worldbuilding</span>
              <span>Visual</span>
              <span>Motion</span>
            </h1>

            <div class="hero__availability">
              <p class="hero__availability-label">Available For</p>
              <p class="hero__availability-text">
                Visual design / Motion graphics / Simple landing pages /
                Creative assets / Roblox / Voxel assets
              </p>
            </div>
          </div>

          <div class="hero__visual" id="works">
            <div class="hero__visual-overlay"></div>
            <div class="hero__visual-floor"></div>
            <div
              id="hero-canvas-host"
              class="hero__canvas-host"
              aria-label="Three.js render area"
            ></div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
