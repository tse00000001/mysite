<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voxel Cow Rescue | DesignTworks Lab</title>
    <meta
      name="description"
      content="A Three.js lab experiment with voxel cows, a UFO, layered backgrounds, and simple interaction."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="rescue-hero" aria-labelledby="hero-title">
      <div class="rescue-hero__mountains" aria-hidden="true"></div>
      <div class="cloud cloud--one" aria-hidden="true"></div>
      <div class="cloud cloud--two" aria-hidden="true"></div>
      <div class="cloud cloud--three" aria-hidden="true"></div>

      <div
        id="scene-host"
        class="scene-host"
        aria-label="Voxel cow rescue Three.js scene"
      ></div>

      <div id="ufo-beam" class="ufo-beam" aria-hidden="true"></div>
      <div class="ufo-glow" aria-hidden="true"></div>
      <div class="front-grass" aria-hidden="true"></div>

      <section class="hero-panel">
        <h1 id="hero-title" class="hero-panel__title">Voxel Cow Rescue</h1>
        <div class="hero-panel__actions" aria-label="Navigation">
          <a href="../index.html">Back to Lab</a>
          <a href="../../index.html">Back to Hub</a>
        </div>
      </section>
    </main>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
